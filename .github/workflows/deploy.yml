name: build-and-push

# Build the Docker image and push it to GitHub Container Registry on every push
# to main. The Ubuntu box then `docker compose pull`s the new :latest image.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "server/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/schmood/eastbound
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # On a PR, build only (it's the green-CI gate for auto-merge); push the
          # image only on pushes to main.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
